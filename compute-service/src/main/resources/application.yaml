spring:
  application:
    name: hcp-compute-service
  lifecycle:
    timeout-per-shutdown-phase: 20s
  jackson:
    time-zone: Asia/Seoul
  datasource:
    url: ${SPRING_CP_JDBC_URL}
    username: ${SPRING_CP_DB_USER}
    password: ${SPRING_CP_DB_PASSWORD}
    driver-class-name: ${SPRING_CP_DB_DRIVER}
  # JPA 설정
  jpa:
    hibernate:
      ddl-auto: none # DB 초기화 전략 (none, create, create-drop, update, validate)
    properties:
      hibernate:
        auto_quote_keyword: false
        globally_quoted_identifiers: false
        format_sql: true     # 쿼리 로그 포맷 (정렬)
        show_sql: true       # 쿼리 로그 출력
        jdbc:
          time_zone: Asia/Seoul
  data:
    redis:
      host: ${SPRING_CP_REDIS_HOST}
      port: ${SPRING_CP_REDIS_PORT}
server:
  shutdown: graceful # graceful shutdown
  port: ${SPRING_CP_PORT}
security:
  allowed-api-paths:




