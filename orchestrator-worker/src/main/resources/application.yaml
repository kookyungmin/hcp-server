spring:
  application:
    name: hcp-orchestrator-worker
  lifecycle:
    timeout-per-shutdown-phase: 20s
  jackson:
    time-zone: Asia/Seoul
  datasource:
    url: ${SPRING_WK_JDBC_URL}
    username: ${SPRING_WK_DB_USER}
    password: ${SPRING_WK_DB_PASSWORD}
    driver-class-name: ${SPRING_WK_DB_DRIVER}
  # JPA 설정
  jpa:
    hibernate:
      ddl-auto: none # DB 초기화 전략 (none, create, create-drop, update, validate)
    properties:
      hibernate:
        auto_quote_keyword: false
        globally_quoted_identifiers: false
        format_sql: true     # 쿼리 로그 포맷 (정렬)
        show_sql: true       # 쿼리 로그 출력
        jdbc:
          time_zone: Asia/Seoul
  kafka:
    bootstrap-servers: ${SPRING_WK_KAFKA_BOOTSTRAP_SERVERS}
    consumer:
      group-id: orchestrator-worker
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      properties:
        max.poll.records: 50
        max.poll.interval.ms: 300000
    producer:
      acks: all
      retries: 10
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5
      linger-ms: 5
      batch-size: 32768
      compression-type: lz4
      delivery-timeout-ms: 120000
      request-timeout-ms: 30000
server:
  shutdown: graceful # graceful shutdown
  port: ${SPRING_WK_PORT}
security:
  allowed-api-paths:
idempotency:
  processing-ttl-seconds: 120
k8s:
  prefix: hcp
  app-key: app
  pvc-key: pvc
  pvc-access-mode: ReadWriteOnce
  pvc-storage-unit: Gi
  service-key: svc
  service-type: NodePort
  network-policy-key: netpol
  container-image-pull-policy: IfNotPresent
  instance-label: hcp.instanceId
  owner-label: hcp.owner
  storage-class-name: loopfs
  pod-runtime-class-name: gvisor
  user-name: hcp_dev





