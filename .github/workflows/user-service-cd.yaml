name: user-service-cd
on:
  push:
    branches:
      - main
    paths:
      - 'user-service/**'
      - '.github/workflows/user-service-cd.yaml'
jobs:
  build-push-update-manifest:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/hcp-user-service
    steps:
      - name: Checkout hcp-server
        uses: actions/checkout@v4

      - name: Set image tag
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push user-service image
        uses: docker/build-push-action@v6
        with:
          context: ./
          file: ./user-service/Dockerfile
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      - name: Checkout manifest repo
        uses: actions/checkout@v4
        with:
          repository: kookyungmin/hcp-k8s-manifest
          token: ${{ secrets.MANIFEST_REPO_TOKEN }}
          path: /

      - name: Update user-service tag in manifest
        run: |
          cd overlays/dev/user-service
          sed -i "s/newTag: .*/newTag: ${IMAGE_TAG}/" kustomization.yaml

      - name: Commit and push manifest changes
        run: |
          cd /
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add overlays/dev/user-service/kustomization.yaml
          git commit -m "chore: update user-service image tag to ${IMAGE_TAG}" || echo "No changes to commit"
          git push
