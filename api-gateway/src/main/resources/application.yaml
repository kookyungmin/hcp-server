server:
  port: ${SPRING_API_GATEWAY_PORT}
spring:
  cloud:
    gateway:
      server:
        webflux:
          default-filters:
            - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials RETAIN_FIRST
          routes:
            - id: user-service
              uri: ${SPRING_UR_SERVICE_URL}
              predicates:
                - Path=/users/**
              filters:
                - StripPrefix=1
            - id: compute-websocket
              uri: ${SPRING_CP_SERVICE_WS_URL}
              predicates:
                - Path=/computes/ws/instances/**
              filters:
                - StripPrefix=1
                - RemoveRequestParameter=accessToken
            - id: compute-service
              uri: ${SPRING_CP_SERVICE_URL}
              predicates:
                - Path=/computes/**
              filters:
                - StripPrefix=1
          globalcors:
            add-to-simple-url-handler-mapping: true
            corsConfigurations:
              '[/**]':
                allowedOrigins:
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - PATCH
                  - DELETE
                  - OPTIONS
                allowedHeaders:
                  - "*"
                exposedHeaders:
                  - "Authorization"
                  - "Set-Cookie"
                allowCredentials: true
                maxAge: 3600
security:
  jwt:
    access-token:
      secret-key: ${JWT_ACCESS_TOKEN_SECRET_KEY}
