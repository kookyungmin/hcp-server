server:
  port: ${SPRING_API_GATEWAY_PORT}
spring:
  application:
    name: hcp-api-gateway
  data:
    redis:
      host: ${SPRING_API_GATEWAY_REDIS_HOST}
      port: ${SPRING_API_GATEWAY_REDIS_PORT}
  cloud:
    gateway:
      server:
        webflux:
          default-filters:
            - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials RETAIN_FIRST
          routes:
            - id: user-service
              uri: ${SPRING_UR_SERVICE_URL}
              predicates:
                - Path=/users/**
              filters:
                - StripPrefix=1
                - name: GlobalRequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 20 # 초당 채워지는 토큰 수
                    redis-rate-limiter.burstCapacity: 40 # 최대 버킷 크기
                    redis-rate-limiter.requestedTokens: 1 # 요청 1건이 소비하는 토큰 수
            - id: compute-service
              uri: ${SPRING_CP_SERVICE_URL}
              predicates:
                - Path=/computes/**
              filters:
                - StripPrefix=1
                - name: GlobalRequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 20 # 초당 채워지는 토큰 수
                    redis-rate-limiter.burstCapacity: 40 # 최대 버킷 크기
                    redis-rate-limiter.requestedTokens: 1 # 요청 1건이 소비하는 토큰 수
            - id: compute-websocket
              uri: ${SPRING_CP_SERVICE_WS_URL}
              predicates:
                - Path=/computes/ws/instances/**
              filters:
                - StripPrefix=1
                - RemoveRequestParameter=accessToken
          globalcors:
            add-to-simple-url-handler-mapping: true
            corsConfigurations:
              '[/**]':
                allowedOrigins:
                allowedOriginPatterns:
                  - "http://www.happycloud.net:*"
                  - "http://localhost:*"
                  - "http://127.0.0.1:*"
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - PATCH
                  - DELETE
                  - OPTIONS
                allowedHeaders:
                  - "*"
                exposedHeaders:
                  - "Authorization"
                  - "Set-Cookie"
                allowCredentials: true
                maxAge: 3600
security:
  jwt:
    access-token:
      secret-key: ${JWT_ACCESS_TOKEN_SECRET_KEY}
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
